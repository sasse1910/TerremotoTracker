# Alembic Configuration File
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Caminho para o diretório de migrations
script_location = alembic

# Formato do nome dos arquivos de migration
# %(rev)s = hash da revision, %(slug)s = nome descritivo
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone para os timestamps nas migrations
timezone = UTC

# URL do banco — lida da variável de ambiente no env.py (não defina aqui!)
# sqlalchemy.url = configurado programaticamente em alembic/env.py

[post_write_hooks]
# hooks executados após gerar uma nova migration (ex: formatação automática)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
