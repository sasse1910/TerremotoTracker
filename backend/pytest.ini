[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    asyncio: marca testes assíncronos
    integration: testes que requerem banco/redis reais
    unit: testes unitários sem I/O externo
