name: CI — Tests & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancela runs antigas do mesmo branch para economizar minutos do GitHub Actions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint (ruff) ────────────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff==0.8.4

      - name: Run Ruff linter
        run: ruff check backend/app backend/tests

      - name: Run Ruff formatter check
        run: ruff format --check backend/app backend/tests

  # ── Job 2: Testes Backend ─────────────────────────────────────────────────
  test-backend:
    name: Tests (Python)
    runs-on: ubuntu-latest
    needs: lint   # só roda se o lint passar

    # Serviços Docker para os testes
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Variáveis de ambiente para o ambiente de teste
      ENVIRONMENT: test
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      REDIS_PASSWORD: ""
      SECRET_KEY: test-secret-key-not-for-production
      ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Alembic migrations
        working-directory: backend
        env:
          PYTHONPATH: .
        run: alembic upgrade head

      - name: Run pytest with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── Job 3: Build Docker (verifica que a imagem builda sem erro) ───────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false   # não faz push, só verifica que builda
          tags: terremototracker-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
